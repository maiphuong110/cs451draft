<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Information Form</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; background: #f9f9f9; }
        input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Personal Information Form</h2>
        <form action="form-handling.php" method="POST">
            
            <label>Full Name:</label>
            <input type="text" name="fullname" placeholder="Nguyen Van A" required>
            
            <label>Gender:</label><br>
            <input type="radio" name="gender" value="Male" checked> Male
            <input type="radio" name="gender" value="Female"> Female<br><br>
            
            <label>Position:</label>
            <input type="text" name="position" placeholder="e.g. Software Engineer" required>
            
            <button type="submit" class="btn">Submit</button>
        </form>
    </div>
</body>
</html>
